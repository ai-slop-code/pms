<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMS</title>
    <!--
      Runtime configuration. Loaded before the app bundle so operators can
      tweak settings (e.g. apiBaseUrl) after deployment without rebuilding.
      config.js also installs the Content-Security-Policy meta tag based on
      apiBaseUrl, so cross-origin deployments don't need any post-build
      editing of this file. See public/config.js for the available options.
    -->
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
