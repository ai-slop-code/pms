components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: pms_session

  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    StayIdPath:
      in: path
      name: stayId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    OccupancyIdPath:
      in: path
      name: occupancyId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    UpstreamUidPath:
      in: path
      name: upstreamUid
      required: true
      schema: { type: string, minLength: 1 }
    ExternalIdPath:
      in: path
      name: externalId
      required: true
      schema: { type: string, minLength: 1 }
    CodeIdPath:
      in: path
      name: codeId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    EventIdPath:
      in: path
      name: eventId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    TransactionIdPath:
      in: path
      name: transactionId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    RuleIdPath:
      in: path
      name: ruleId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    InvoiceIdPath:
      in: path
      name: invoiceId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    TemplateIdPath:
      in: path
      name: templateId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    MonthPath:
      in: path
      name: month
      required: true
      schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
    MonthQuery:
      in: query
      name: month
      required: true
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"

  headers:
    Deprecation:
      description: Indicates that the endpoint is deprecated.
      schema: { type: string }
    Warning:
      description: Human-readable migration target for the deprecated endpoint.
      schema: { type: string }

  responses:
    BadRequest:
      description: Invalid request payload.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Authentication required.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Caller lacks permission.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: Request conflicts with current calendar state.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    HealthStatus:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        reason: { type: string }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
        code:
          type: string
          description: Optional machine-readable code.

    DeprecatedOccupancyExportResponse:
      type: object
      deprecated: true
      required: [occupancies]
      properties:
        occupancies:
          type: array
          items:
            type: object
            additionalProperties: true

    DeprecatedOccupancyTokenCreateResponse:
      type: object
      deprecated: true
      required: [id, token]
      properties:
        id: { type: integer, format: int64 }
        token: { type: string }

    DeprecatedOccupancyTokensResponse:
      type: object
      deprecated: true
      required: [tokens]
      properties:
        tokens:
          type: array
          items:
            type: object
            required: [id, created_at]
            properties:
              id: { type: integer, format: int64 }
              label: { type: string }
              created_at: { type: string, format: date-time }
              last_used_at: { type: string, format: date-time }

    ActionResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        error: { type: string }

    FinanceBookingPayoutsResponse:
      type: object
      required: [payouts]
      properties:
        month: { type: string }
        mapped_only: { type: string }
        payouts:
          type: array
          items: { $ref: "#/components/schemas/FinanceBookingPayout" }

    FinanceBookingPayout:
      type: object
      required: [id, reference_number, net_cents, payout_date, has_payout_data, has_statement_data]
      properties:
        id: { type: integer, format: int64 }
        reference_number: { type: string }
        payout_id: { type: string }
        row_type: { type: string }
        check_in_date: { type: string, format: date }
        check_out_date: { type: string, format: date }
        guest_name: { type: string }
        reservation_status: { type: string }
        currency: { type: string }
        payment_status: { type: string }
        amount_cents: { type: integer, format: int64 }
        commission_cents: { type: integer, format: int64 }
        payment_service_fee_cents: { type: integer, format: int64 }
        net_cents: { type: integer }
        payout_date: { type: string, format: date-time }
        transaction_id: { type: integer, format: int64 }
        named_stay_id: { type: integer, format: int64 }
        occupancy_id:
          type: integer
          format: int64
          deprecated: true
        occupancy_summary: { type: string }
        named_stay_display_name: { type: string }
        named_stay_type: { type: string, enum: [booking_com, external, maintenance, personal_use] }
        named_stay_check_in_date: { type: string, format: date }
        named_stay_check_out_date: { type: string, format: date }
        linked_invoice_id: { type: integer, format: int64 }
        has_payout_data: { type: boolean }
        has_statement_data: { type: boolean }

    FinanceNamedStayCandidate:
      type: object
      required: [id, display_name, stay_type, check_in_date, check_out_date, status, has_finance_data]
      properties:
        id: { type: integer, format: int64 }
        display_name: { type: string }
        stay_type: { type: string, enum: [booking_com, external, maintenance, personal_use] }
        check_in_date: { type: string, format: date }
        check_out_date: { type: string, format: date }
        status: { type: string, enum: [active, cancelled, archived] }
        review_status: { type: string, enum: [confirmed, needs_review] }
        manual_revenue_cents: { type: integer, format: int64 }
        has_finance_data: { type: boolean }

    FinanceStayCandidatesResponse:
      type: object
      required: [stays]
      properties:
        stays:
          type: array
          items: { $ref: "#/components/schemas/FinanceNamedStayCandidate" }

    FinanceBookingPayoutMapRequest:
      type: object
      properties:
        named_stay_id: { type: integer, format: int64, nullable: true }
        occupancy_id:
          type: integer
          format: int64
          nullable: true
          deprecated: true

    FinanceBookingPayoutMapResponse:
      type: object
      required: [ok, reference_number]
      properties:
        ok: { type: boolean }
        reference_number: { type: string }
        named_stay_id: { type: integer, format: int64, nullable: true }

    FinanceBookingPayoutCreateStayResponse:
      type: object
      required: [ok, reference_number, named_stay_id, created]
      properties:
        ok: { type: boolean }
        reference_number: { type: string }
        named_stay_id: { type: integer, format: int64 }
        occupancy_id:
          type: integer
          format: int64
          deprecated: true
        created: { type: boolean }

    InvoiceStayCandidatesResponse:
      type: object
      required: [stays, occupancies]
      properties:
        stays:
          type: array
          items: { $ref: "#/components/schemas/FinanceNamedStayCandidate" }
        occupancies:
          type: array
          deprecated: true
          items: { type: object }

    NukiUpcomingStaysResponse:
      type: object
      required: [stays]
      properties:
        stays:
          type: array
          items: { $ref: "#/components/schemas/NukiUpcomingStay" }

    NukiUpcomingStay:
      type: object
      required:
        - stay_id
        - source_event_uid
        - summary
        - saved_pin_name
        - stay_type
        - start_at
        - end_at
        - occupancy_status
        - generated_code_id
        - generated_label
        - generated_status
        - generated_masked
        - generated_valid_from
        - generated_valid_until
        - generated_error
        - generated_updated_at
      properties:
        stay_id: { type: integer, format: int64 }
        legacy_occupancy_id: { type: integer, format: int64 }
        occupancy_id:
          type: integer
          format: int64
          deprecated: true
          description: Legacy compatibility ID retained until old Nuki callers are removed.
        source_event_uid: { type: string }
        summary: { type: string, nullable: true }
        saved_pin_name: { type: string, nullable: true }
