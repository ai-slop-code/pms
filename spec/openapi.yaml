openapi: 3.1.0
info:
  title: PMS Backend API
  description: |
    OpenAPI contract for the PMS backend. This spec is the source of truth for
    the public HTTP surface consumed by the Vue frontend and external clients.

    The complete registered backend route inventory is represented here. Detailed
    schemas are authoritative for concrete operations. Operations marked with
    `x-contract-status: route-only` document routing only and still require
    request and response contract refinement.
  version: 1.0.0
  contact:
    name: PMS Engineering

servers:
  - url: /api
    description: Primary API prefix (also served at site root paths like `/healthz`)

tags:
  - name: System
  - name: Auth
  - name: Users
  - name: Properties
  - name: Occupancy
  - name: Nuki
  - name: Finance
  - name: Invoices
  - name: Messages
  - name: Dashboard
  - name: Analytics

security:
  - SessionCookie: []

x-route-read: &route-read
  summary: Registered backend read operation; response schema remains module-specific.
  x-contract-status: route-only
  responses:
    default:
      description: Response emitted by the registered backend handler.
x-route-write: &route-write
  summary: Registered backend write operation; request and response schemas remain module-specific.
  x-contract-status: route-only
  responses:
    default:
      description: Response emitted by the registered backend handler.
x-route-deprecated-read: &route-deprecated-read
  summary: Deprecated occupancy compatibility read operation.
  deprecated: true
  x-contract-status: route-only
  responses:
    default:
      description: Legacy compatibility response.
      headers:
        Deprecation: { $ref: "#/components/headers/Deprecation" }
        Warning: { $ref: "#/components/headers/Warning" }
x-route-deprecated-write: &route-deprecated-write
  summary: Deprecated occupancy compatibility write operation.
  deprecated: true
  x-contract-status: route-only
  responses:
    default:
      description: Legacy compatibility response.
      headers:
        Deprecation: { $ref: "#/components/headers/Deprecation" }
        Warning: { $ref: "#/components/headers/Warning" }

paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /readyz:
    get:
      tags: [System]
      summary: Readiness probe (checks DB connectivity).
      security: []
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
        "503":
          description: Not ready — dependency unhealthy.

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and start a session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in. Session cookie set.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session.
      responses:
        "204": { description: Logged out. }

  /auth/me:
    get:
      tags: [Auth]
      summary: Return current authenticated user.
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users:
    get:
      tags: [Users]
      summary: List users (admin).
      responses:
        "200":
          description: User list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Users]
      summary: Create a user (admin).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Users]
      summary: Get user by ID.
      responses:
        "200":
          description: User.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Users]
      summary: Update user.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /users/{id}/property-permissions:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    post:
      tags: [Users]
      summary: Grant a property-scoped permission to the user.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GrantPermissionRequest" }
      responses:
        "201":
          description: Permission grant created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserPermission" }

  /users/{id}/property-permissions/{permissionId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: permissionId
        required: true
        schema: { type: integer, format: int64 }
    delete:
      tags: [Users]
      summary: Revoke a property-scoped permission.
      responses:
        "204": { description: Revoked. }
        "404": { $ref: "#/components/responses/NotFound" }

  /properties:
    get:
      tags: [Properties]
      summary: List properties visible to the caller.
      responses:
        "200":
          description: Property list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Property" }
    post:
      tags: [Properties]
      summary: Create a property (admin).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePropertyRequest" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }

  /properties/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Properties]
      summary: Get property by ID.
      responses:
        "200":
          description: Property.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }
    patch:
      tags: [Properties]
      summary: Update property.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePropertyRequest" }
      responses:
        "200":
          description: Updated property.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Property" }

  /properties/{id}/dashboard:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Dashboard]
      summary: Return permission-filtered dashboard widgets.
      responses:
        "200":
          description: Dashboard widgets.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummaryResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/messages/stays:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Messages]
      summary: List message-eligible named stays.
      responses:
        "200":
          description: Message-eligible named stays.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageStaysResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/messages/generate:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Messages]
      summary: Generate guest messages for a named stay.
      parameters:
        - in: query
          name: stay_id
          schema: { type: integer, format: int64 }
          description: Preferred PMS 21 named stay identity.
        - in: query
          name: occupancy_id
          schema: { type: integer, format: int64 }
          deprecated: true
          description: Deprecated compatibility identity resolved through occupancy_stay_migration_map.
      responses:
        "200":
          description: Rendered messages.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenerateMessagesResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /properties/{id}/booking-blocks:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/MonthQuery"
    get:
      tags: [Occupancy]
      summary: List raw Booking.com blocks for a month.
      responses:
        "200":
          description: Raw booking blocks.
          content:
            application/json:
              schema:
                type: object
                required: [raw_blocks]
                properties:
                  raw_blocks:
                    type: array
                    items: { $ref: "#/components/schemas/RawBookingBlock" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/stays:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Occupancy]
      summary: List named stays for a month.
      parameters:
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          description: Named stays.
          content:
            application/json:
              schema:
                type: object
                required: [named_stays]
                properties:
                  named_stays:
                    type: array
                    items: { $ref: "#/components/schemas/NamedStay" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Occupancy]
      summary: Create a named stay.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamedStayCreateRequest" }
      responses:
        "200":
          description: Named stay created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamedStayMutationResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/stays/{stayId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/StayIdPath"
    patch:
      tags: [Occupancy]
      summary: Update a named stay.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamedStayPatchRequest" }
      responses:
        "200":
          description: Named stay updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamedStayMutationResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/stays/{stayId}/status:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/StayIdPath"
    patch:
      tags: [Occupancy]
      summary: Change named stay status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, cancelled, archived]
      responses:
        "200":
          description: Named stay status changed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamedStayMutationResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/booking-blocks/{blockId}/promote:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: blockId
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    post:
      tags: [Occupancy]
      summary: Promote a raw Booking.com block range to a named stay.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NamedStayCreateRequest" }
      responses:
        "200":
          description: Named stay created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NamedStayMutationResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/availability-blocks:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Occupancy]
      summary: List non-stay availability blocks for a month.
      parameters:
        - $ref: "#/components/parameters/MonthQuery"
      responses:
        "200":
          description: Availability blocks.
          content:
            application/json:
              schema:
                type: object
                required: [availability_blocks]
                properties:
                  availability_blocks:
                    type: array
                    items: { $ref: "#/components/schemas/AvailabilityBlock" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Occupancy]
      summary: Create a non-stay availability block.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvailabilityBlockRequest" }
      responses:
        "200":
          description: Availability block created.
          content:
            application/json:
              schema:
                {
                  $ref: "#/components/schemas/AvailabilityBlockMutationResponse",
                }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/availability-blocks/{blockId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: blockId
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    patch:
      tags: [Occupancy]
      summary: Update a non-stay availability block.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvailabilityBlockRequest" }
      responses:
        "200":
          description: Availability block updated.
          content:
            application/json:
              schema:
                {
                  $ref: "#/components/schemas/AvailabilityBlockMutationResponse",
                }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /properties/{id}/occupancy-calendar:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/MonthQuery"
    get:
      tags: [Occupancy]
      summary: Return combined raw-block, named-stay, and availability calendar model.
      responses:
        "200":
          description: Combined occupancy calendar.
          content:
            application/json:
              schema:
                type: object
                required: [calendar]
                properties:
                  calendar: { $ref: "#/components/schemas/OccupancyCalendar" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/occupancy-export:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Occupancy]
      summary: Deprecated public occupancy JSON export.
      deprecated: true
      security: []
      description: Public occupancy export is retired by PMS 21. Native Google Calendar cleaning sync is the supported external calendar integration path.
      responses:
        "200":
          description: Legacy export payload when temporarily enabled for compatibility.
          headers:
            Deprecation: { $ref: "#/components/headers/Deprecation" }
            Warning: { $ref: "#/components/headers/Warning" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeprecatedOccupancyExportResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "410":
          description: Occupancy export is disabled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /properties/{id}/occupancy-api-tokens:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Occupancy]
      summary: Deprecated occupancy export token list.
      deprecated: true
      responses:
        "200":
          description: Legacy export tokens.
          headers:
            Deprecation: { $ref: "#/components/headers/Deprecation" }
            Warning: { $ref: "#/components/headers/Warning" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeprecatedOccupancyTokensResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Occupancy]
      summary: Deprecated occupancy export token creation.
      deprecated: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, nullable: true }
      responses:
        "201":
          description: Legacy export token created.
          headers:
            Deprecation: { $ref: "#/components/headers/Deprecation" }
            Warning: { $ref: "#/components/headers/Warning" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeprecatedOccupancyTokenCreateResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/occupancy-api-tokens/{tokenId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: tokenId
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    delete:
      tags: [Occupancy]
      summary: Deprecated occupancy export token revocation.
      deprecated: true
      responses:
        "204":
          description: Token revoked.
          headers:
            Deprecation: { $ref: "#/components/headers/Deprecation" }
            Warning: { $ref: "#/components/headers/Warning" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /properties/{id}/nuki/upcoming-stays:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Nuki]
      summary: List Nuki-eligible upcoming named stays and generated code state.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 300, default: 120 }
      responses:
        "200":
          description: Nuki upcoming stays.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NukiUpcomingStaysResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/nuki/upcoming-stays/{stayId}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - $ref: "#/components/parameters/StayIdPath"
    patch:
      tags: [Nuki]
      summary: Update the named stay display name used for Nuki PIN labels.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NukiStayNamePatchRequest" }
      responses:
        "200":
          description: Stay name saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NukiStayNamePatchResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /properties/{id}/nuki/codes/generate:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    post:
      tags: [Nuki]
      summary: Generate Nuki guest codes for all eligible named stays or one named stay.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NukiGenerateRequest" }
      responses:
        "200":
          description: Generation result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ActionResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /properties/{id}/nuki/codes/{codeId}/reveal-pin:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: codeId
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    get:
      tags: [Nuki]
      summary: Reveal a generated Nuki PIN with write-level permission and audit logging.
      responses:
        "200":
          description: Plaintext PIN.
          content:
            application/json:
              schema:
                type: object
                required: [pin]
                properties:
                  pin: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /properties/{id}/finance/booking-payouts:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Finance]
      summary: List Booking.com finance rows mapped to named stays.
      parameters:
        - in: query
          name: month
          schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
        - in: query
          name: mapped_only
          schema: { type: boolean }
      responses:
        "200":
          description: Finance booking rows.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinanceBookingPayoutsResponse" }

  /properties/{id}/finance/stay-candidates:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Finance]
      summary: List named stays eligible for finance mapping.
      parameters:
        - in: query
          name: month
          schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Named-stay candidates.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinanceStayCandidatesResponse" }

  /properties/{id}/finance/booking-payouts/{referenceNumber}/map:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: referenceNumber
        required: true
        schema: { type: string }
    patch:
      tags: [Finance]
      summary: Map or clear a Booking.com finance row to a named stay.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FinanceBookingPayoutMapRequest" }
      responses:
        "200":
          description: Mapping saved.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinanceBookingPayoutMapResponse" }

  /properties/{id}/finance/booking-payouts/{referenceNumber}/create-stay:
    parameters:
      - $ref: "#/components/parameters/IdPath"
      - in: path
        name: referenceNumber
        required: true
        schema: { type: string }
    post:
      tags: [Finance]
      summary: Explicitly create or link a named stay from a finance row.
      responses:
        "200":
          description: Named stay created or linked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FinanceBookingPayoutCreateStayResponse" }

  /properties/{id}/invoices/occupancy-candidates:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Invoices]
      summary: List named stays for invoice stay selection.
      responses:
        "200":
          description: Named-stay candidates; deprecated occupancies is empty for compatibility.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InvoiceStayCandidatesResponse" }

  /health:
    get:
      tags: [System]
      summary: Liveness probe alias
      security: []
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/2fa/verify:
    post: *route-write
  /auth/2fa/status:
