      type: object
      required:
        [
          id,
          property_id,
          display_name,
          stay_type,
          check_in_date,
          check_out_date,
          status,
          cleaning_required,
          review_status,
          counts_as_sold,
          nuki_generation_status,
          covered_nights,
          source_links,
          cleaning_events,
        ]
      properties:
        id: { type: integer, format: int64 }
        property_id: { type: integer, format: int64 }
