# nginx config for the PMS frontend container.
#
# - Serves the static Vue build with SPA-style history fallback.
# - Reverse-proxies /api/* to the backend service on the compose network.
# - The outer Caddy layer still terminates TLS and adds HSTS; this file
#   only handles the in-cluster hop.

upstream pms_backend {
    server pms-backend:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable server version disclosure.
    server_tokens off;

    # Long-cache hashed assets; never cache index.html so deploys propagate.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Runtime config — regenerated by docker-entrypoint at start, must
    # never be cached or the apiBaseUrl change won't propagate.
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Health endpoint for the reverse proxy / uptime checks.
    location = /healthz {
        proxy_pass http://pms_backend/healthz;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API + any backend-owned paths.
    location /api/ {
        proxy_pass http://pms_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 25m;
    }

    # SPA history fallback for everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
